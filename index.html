<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aufgabenpool öffnen</title>
  <style>
    :root {
      --accent: #0891b2;
      --accent-dark: #0e7490;
      --bg: #f8fafc;
      --text: #111827;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 65%);
      color: var(--text);
    }
    main {
      width: min(720px, 92vw);
      padding: 48px;
      text-align: center;
      background: rgba(255,255,255,0.92);
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 auto 32px;
      max-width: 560px;
      font-size: 1.15rem;
      line-height: 1.55;
      color: #4b5563;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 30px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 28px rgba(8, 145, 178, 0.28);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    a.button:hover {
      transform: translateY(-2px);
      background: var(--accent-dark);
      box-shadow: 0 16px 36px rgba(8, 145, 178, 0.34);
    }
    .hint {
      margin-top: 26px;
      font-size: 0.95rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main>
    <h1>Aufgabenpool öffnen</h1>
    <p>Ein Klick öffnet ChatGPT direkt mit dem vorbereiteten Prompt zur Differenzierung einer Deutschaufgabe.</p>


    <div class="hint">Falls PowerPoint den langen Link nicht sauber öffnet, verlinke einfach diese HTML-Datei.</div>
  </main>
</body>
</html>
